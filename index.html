<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>DLC参数查询器</title>
  <link rel="icon" type="image/webp" href="ico.webp">
  <link rel="preload" href="data/vehicles.json" as="fetch" type="application/json" crossorigin>
  <link rel="preload" href="data/weapons.json" as="fetch" type="application/json" crossorigin>
  <link rel="preload" href="data/maps.json" as="fetch" type="application/json" crossorigin>
  <link rel="preload" href="data/rwr-players-pacific.json" as="fetch" type="application/json" crossorigin>
  <link rel="preload" href="model/models.json" as="fetch" type="application/json" crossorigin>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f6ff;
      --panel: rgba(255, 255, 255, 0.7);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(93, 125, 159, 0.18);
      --text: #182838;
      --muted: #66788d;
      --accent: #12b7c8;
      --accent-2: #3f7cff;
      --accent-soft: rgba(63, 124, 255, 0.1);
      --good: #16a36b;
      --bad: #dc4d4d;
      --same: #7a8892;
      --shadow: 0 24px 70px rgba(35, 76, 124, 0.16);
      --soft-shadow: 0 12px 34px rgba(35, 76, 124, 0.1);
      --radius: 8px;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
      touch-action: pan-x pan-y;
    }

    body {
      margin: 0;
      min-height: 100vh;
      max-width: 100%;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(240, 250, 255, 0.96) 0%, rgba(245, 249, 255, 0.9) 42%, rgba(255, 248, 251, 0.72) 100%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      overflow: hidden;
      touch-action: pan-x pan-y;
      -webkit-text-size-adjust: 100%;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .shell {
      height: 100vh;
      display: grid;
      padding: 18px;
      grid-template-columns: minmax(0, 1fr);
    }

    .main {
      min-width: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
      touch-action: pan-x pan-y;
      -webkit-text-size-adjust: 100%;
    }

    .topbar {
      position: relative;
      z-index: 6;
      min-height: 126px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: minmax(430px, 1.28fr) minmax(680px, 1.42fr) minmax(430px, 1fr);
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: none;
      backdrop-filter: none;
    }

    .brand-splash-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      align-self: stretch;
    }

    .brand-splash {
      display: block;
      width: min(680px, 126%);
      height: 116px;
      margin-left: -72px;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(35, 76, 124, 0.14));
    }

    .mobile-menu-button {
      display: none;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      color: #345365;
      background: rgba(235, 244, 252, 0.86);
      box-shadow: inset 0 1px 2px rgba(35, 76, 124, 0.06);
      cursor: pointer;
      font-weight: 900;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .mobile-menu-button::before {
      content: "☰";
      font-size: 18px;
      line-height: 1;
    }

    .tag-tabs {
      display: inline-flex;
      align-items: center;
      justify-self: center;
      align-self: center;
      justify-content: center;
      width: min(620px, 100%);
      min-height: 58px;
      gap: 8px;
      padding: 6px;
      border: 0;
      border-radius: 12px;
      background: rgba(235, 244, 252, 0.72);
      box-shadow: inset 0 1px 2px rgba(35, 76, 124, 0.06);
    }

    .tag-tab {
      flex: 1 1 0;
      border: 0;
      border-radius: 8px;
      min-height: 46px;
      padding: 0 22px;
      color: #52677a;
      background: transparent;
      cursor: pointer;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
      transition: color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .tag-tab.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(32, 200, 212, 0.96), rgba(63, 124, 255, 0.96));
      box-shadow: 0 8px 18px rgba(43, 122, 230, 0.16);
    }

    .hidden {
      display: none !important;
    }

    .search {
      width: min(370px, 100%);
      position: relative;
      flex: 0 1 320px;
      justify-self: end;
      align-self: center;
    }

    .search input {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: rgba(235, 244, 252, 0.7);
      min-height: 52px;
      padding: 12px 14px 12px 42px;
      outline: 0;
      color: var(--text);
      font-size: 16px;
      box-shadow: inset 0 1px 2px rgba(35, 76, 124, 0.06);
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .search input:focus {
      background: #fff;
      box-shadow: 0 0 0 4px rgba(63, 124, 255, 0.1), inset 0 1px 2px rgba(35, 76, 124, 0.04);
    }

    .search span {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 19px;
    }

    .compare-bar {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: auto auto auto auto auto;
      justify-content: start;
      align-items: center;
      gap: 10px;
      padding: 18px 22px 16px;
      border-bottom: 0;
      background: #fff;
      box-shadow: none;
      backdrop-filter: none;
    }

    .content-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: none;
    }

    .primary {
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .primary:hover:not(:disabled),
    .confirm:hover,
    .target-mode-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(43, 122, 230, 0.26);
    }

    .primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .primary.danger {
      background: linear-gradient(135deg, #e25555, #c92f52);
      box-shadow: 0 10px 24px rgba(201, 47, 82, 0.18);
    }

    .confirm {
      display: none;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #25c685, #0c9f72);
      box-shadow: 0 12px 24px rgba(7, 158, 104, 0.18);
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .confirm.show {
      display: inline-flex;
      align-items: center;
    }

    .compare-hint {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .target-mode-button {
      margin-left: 44px;
      border: 0;
      border-radius: 8px;
      width: max-content;
      max-width: 180px;
      padding: 0 16px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .target-mode-button.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #e25555, #c92f52);
    }

    .target-mode-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .target-hint {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .table-wrap {
      position: relative;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background: #fff;
      padding-bottom: 76px;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      contain: layout paint;
    }

    .loading-panel {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(247, 251, 255, 0.82);
      backdrop-filter: blur(8px) saturate(125%);
      -webkit-backdrop-filter: blur(8px) saturate(125%);
    }

    .loading-panel.open {
      display: grid;
    }

    .loading-panel.error .loading-spinner {
      animation: none;
      border-color: rgba(220, 77, 77, 0.18);
      border-top-color: var(--bad);
      border-right-color: var(--bad);
    }

    .loading-panel.error .loading-title {
      color: var(--bad);
    }

    .loading-card {
      display: grid;
      justify-items: center;
      gap: 14px;
      min-width: min(280px, 82vw);
      padding: 26px 30px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 42px rgba(35, 76, 124, 0.14);
    }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid rgba(63, 124, 255, 0.14);
      border-top-color: var(--accent-2);
      border-right-color: var(--accent);
      animation: loadingSpin 0.82s linear infinite;
    }

    .loading-title {
      font-weight: 900;
      color: var(--text);
      line-height: 1.3;
    }

    .loading-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    @keyframes loadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 12;
      background: #fbfdff;
      box-shadow: 0 1px 0 var(--line), 0 8px 18px rgba(35, 76, 124, 0.045);
    }

    col.faction-col {
      width: 5%;
    }

    col.name-col {
      width: 12%;
    }

    col.icon-col {
      width: 9%;
    }

    col.short-col {
      width: 7%;
    }

    col.medium-col {
      width: 8%;
    }

    col.weapon-col {
      width: 15%;
    }

    col.vision-col {
      width: 10%;
    }

    col.blast-col {
      width: 7%;
    }

    col.weapon-faction-col {
      width: 8%;
    }

    col.weapon-type-col {
      width: 10%;
    }

    col.weapon-name-col {
      width: 20%;
    }

    col.weapon-stat-col {
      width: 11%;
    }

    col.player-name-col {
      width: 28%;
    }

    col.player-stat-col {
      width: 12%;
    }

    col.map-group-col {
      width: 14%;
    }

    col.map-name-col {
      width: 18%;
    }

    col.map-actions-col {
      width: 68%;
    }

    col.model-name-col {
      width: 46%;
    }

    col.model-icon-col {
      width: 18%;
    }

    col.model-actions-col {
      width: 36%;
    }

    thead th {
      position: relative;
      color: #3d515d;
      background: transparent;
      border-bottom: 0;
      box-shadow: none;
      padding: 0 8px;
      height: 58px;
      line-height: 1.22;
      white-space: normal;
      overflow-wrap: anywhere;
      text-align: center;
      vertical-align: middle;
    }

    thead th,
    tbody td {
      text-align: center;
    }

    thead th {
      align-content: center;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: normal;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .sort-indicator {
      display: none;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-left: 5px;
      color: currentColor;
      font-size: 12px;
      line-height: 1;
      vertical-align: middle;
    }

    thead th.sorted {
      color: #fff;
      font-weight: 900;
      border-bottom-color: transparent;
    }

    thead th.sorted.advantage-sort {
      background: linear-gradient(135deg, #25c685, #0c9f72);
    }

    thead th.sorted.disadvantage-sort {
      background: linear-gradient(135deg, #e25555, #c92f52);
    }

    thead th.sorted .sort-indicator {
      display: none;
    }

    tbody td {
      position: relative;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(118, 140, 153, 0.16);
      vertical-align: middle;
      text-align: center;
      line-height: 1.28;
      overflow-wrap: anywhere;
      word-break: break-word;
      transition: background 0.14s ease, color 0.14s ease, font-size 0.14s ease, font-weight 0.14s ease;
    }

    tbody tr {
      position: relative;
      background: rgba(255, 255, 255, 0.42);
      transform-origin: center;
      transition: background 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    tbody tr:nth-child(even) {
      background: rgba(250, 253, 255, 0.58);
    }

    body:not(.compare-mode) tbody tr:hover {
      z-index: 6;
      background: rgba(190, 242, 216, 0.9);
      transform: scale(1.012);
      box-shadow:
        inset 4px 0 0 rgba(32, 182, 108, 0.92),
        inset 0 0 0 9999px rgba(206, 245, 221, 0.22),
        0 14px 30px rgba(24, 126, 82, 0.16);
      cursor: pointer;
    }

    body:not(.compare-mode) tbody tr:hover td {
      background: rgba(206, 245, 221, 0.34);
      font-size: 14px;
      font-weight: 900;
    }

    #vehicleTable tbody td,
    #weaponTable tbody td,
    #playerTable tbody td,
    #modelTable tbody td {
      padding-top: 16px;
      padding-bottom: 16px;
      font-size: 15px;
      line-height: 1.34;
    }

    #vehicleTable tbody tr,
    #weaponTable tbody tr,
    #playerTable tbody tr,
    #modelTable tbody tr {
      min-height: 82px;
    }

    .pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .pagination.show {
      display: flex;
    }

    .pagination-panel {
      z-index: 15;
      display: none;
      min-height: 76px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 -8px 22px rgba(35, 76, 124, 0.08);
      backdrop-filter: blur(10px) saturate(125%);
      -webkit-backdrop-filter: blur(10px) saturate(125%);
      align-items: center;
      justify-content: center;
    }

    .pagination-panel.show {
      display: flex;
    }

    .page-button {
      min-width: 42px;
      min-height: 38px;
      border: 1px solid rgba(93, 125, 159, 0.2);
      border-radius: 8px;
      padding: 0 12px;
      color: #345365;
      background: rgba(235, 244, 252, 0.82);
      cursor: pointer;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    .page-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #fff;
      box-shadow: 0 8px 18px rgba(35, 76, 124, 0.12);
    }

    .page-button.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, rgba(32, 200, 212, 0.96), rgba(63, 124, 255, 0.96));
      box-shadow: 0 8px 18px rgba(43, 122, 230, 0.16);
    }

    .page-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .page-ellipsis {
      color: var(--muted);
      font-weight: 900;
      padding: 0 2px;
    }

    .table-icon-cell {
      padding-top: 8px !important;
      padding-bottom: 8px !important;
    }

    .row-icon {
      width: 66px;
      height: 66px;
      object-fit: contain;
      vertical-align: middle;
      image-rendering: auto;
      filter: drop-shadow(0 8px 12px rgba(35, 76, 124, 0.14));
    }

    .row-icon.weapon-icon {
      transform: rotate(90deg);
    }

    .model-panel {
      width: 100%;
      min-width: 0;
    }

    .map-panel {
      width: 100%;
      min-width: 0;
    }

    .map-series-list {
      display: grid;
      gap: 22px;
      padding: 22px;
      align-content: start;
      content-visibility: auto;
      contain-intrinsic-size: 1200px;
    }

    .map-series {
      min-width: 0;
      display: grid;
      gap: 14px;
      padding: 24px 18px 18px;
      border: 1px solid rgba(93, 125, 159, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 251, 255, 0.74)),
        rgba(255, 255, 255, 0.82);
      content-visibility: auto;
      contain-intrinsic-size: 560px;
    }

    .map-series-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-height: 68px;
    }

    .map-series-title {
      color: #203244;
      font-size: 36px;
      font-weight: 950;
      line-height: 1.25;
    }

    .map-series-title .faction {
      min-height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      font-size: 28px;
      line-height: 1;
    }

    .player-id-badge {
      display: inline-grid;
      place-items: center;
      max-width: min(100%, 260px);
      min-height: 42px;
      padding: 8px 22px;
      border-radius: 999px;
      color: #215a98;
      background: linear-gradient(135deg, rgba(219, 232, 255, 0.96), rgba(226, 242, 255, 0.9));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), 0 8px 18px rgba(35, 76, 124, 0.08);
      font-weight: 950;
      line-height: 1.12;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .map-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .model-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      padding: 22px;
      align-content: start;
    }

    .map-card,
    .model-card {
      min-width: 0;
      min-height: 218px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(104px, 1fr) auto;
      gap: 12px;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(246, 251, 255, 0.78)),
        rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 18px rgba(35, 76, 124, 0.1);
      cursor: pointer;
      text-align: center;
      font: inherit;
      transform-origin: center;
      backface-visibility: hidden;
      transform: translateZ(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .map-card {
      min-height: 238px;
      grid-template-rows: minmax(146px, 1fr) auto;
      overflow: hidden;
    }

    .model-card:disabled {
      cursor: not-allowed;
      opacity: 0.56;
      filter: grayscale(0.3);
    }

    @media (hover: hover) and (pointer: fine) {
      .map-card:hover,
      .model-card:not(:disabled):hover {
        z-index: 2;
        transform: translateY(-4px) scale(1.04);
        border-color: rgba(32, 200, 212, 0.42);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(235, 252, 255, 0.88)),
          rgba(255, 255, 255, 0.94);
        box-shadow: 0 14px 30px rgba(35, 76, 124, 0.18);
      }
    }

    .map-card:focus-visible,
    .model-card:focus-visible {
      outline: 3px solid rgba(63, 124, 255, 0.38);
      outline-offset: 3px;
    }

    .map-card:active,
    .model-card:active:not(:disabled) {
      transform: scale(0.98);
    }

    .map-card-thumbnail {
      min-width: 0;
      display: grid;
      place-items: center;
      border-radius: 7px;
      overflow: hidden;
      background: rgba(226, 236, 247, 0.58);
      box-shadow: inset 0 0 0 1px rgba(93, 125, 159, 0.16);
    }

    .map-card-image {
      display: block;
      width: 100%;
      height: 154px;
      object-fit: cover;
      image-rendering: auto;
      filter: saturate(1.04) contrast(1.02);
    }

    .map-card-placeholder {
      min-height: 154px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 850;
    }

    .map-card-name,
    .model-card-faction {

    .modal.open .dialog {
      animation: dialogIn 0.22s ease-out;

    .dialog {
      width: min(1080px, 96vw);
      max-height: min(840px, 92vh);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 44px rgba(21, 54, 94, 0.2);

      backface-visibility: hidden;
      transform: translateZ(0);
      contain: layout paint;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);

    @keyframes dialogIn {
      from {

    .tank-model {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 198px;
      height: 62px;
      transform: translate(-50%, -50%);
      background: transparent;
      border: 0;
      z-index: 4;
    }

    .tank-model::before,
    .tank-model::after {
      content: "";
      position: absolute;
      background: #5f735f;
    }

    .tank-model::before {
      left: 0;
      top: 0;
      width: 116px;
      height: 62px;
      border-radius: 6px;
    }

    .tank-model::after {
      left: 92px;
      top: 25px;
      width: 82px;
      height: 12px;
      border-radius: 0 6px 6px 0;
    }

    .tank-label {
      display: none;

    .threat-token {
      position: absolute;
      left: 0;
      top: 0;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      box-shadow: 0 10px 26px rgba(28, 59, 72, 0.16);
      cursor: grab;
      isolation: isolate;
      touch-action: none;
      user-select: none;
      z-index: 3;
      will-change: transform;
      backface-visibility: hidden;
      transition: box-shadow 0.16s ease;
    }

    .threat-token::before,
    .threat-token::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .threat-token::before {
      inset: -4px;
      background: inherit;
      z-index: -1;
    }

    .threat-token::after {
      left: 50%;
      top: 50%;
      width: 62px;
      height: 62px;
      border: 2px solid rgba(229, 57, 53, 0.86);
      box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center;
      z-index: -2;
    }

    .threat-token.dragging {
      cursor: grabbing;
      transition: none;
    }

    .threat-token.top-threat {
      z-index: 4;
      box-shadow: 0 12px 26px rgba(229, 57, 53, 0.16), 0 8px 20px rgba(28, 59, 72, 0.14);
    }

    .threat-token.top-threat::before,
    .threat-token.top-threat::after {
      opacity: 1;

      animation: topThreatRing 1.25s ease-in-out infinite;

      100% {
        transform: translate(-50%, -50%) scale(0.98);

      50% {
        transform: translate(-50%, -50%) scale(1.04);

    .threat-token.dragging {

        height: auto;
        min-height: 100%;
      }

      .tank-model {
        transform: translate(-50%, -50%) scale(0.72);
      }

      .threat-token {
        width: 48px;
        height: 48px;
        font-size: 10px;
      }

      .target-panel {
        min-height: 0;
        display: block;
      }

      .target-section + .target-section {
        margin-top: 10px;
      }

      .target-section:last-child {
        display: block;
      }

      .target-dialog .dialog-body {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .priority-list {
        height: auto;
        max-height: none;
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <script>
    (() => {
      let lastTouchEnd = 0;
      document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gesturechange", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gestureend", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("touchmove", (event) => {
        if (event.touches.length > 1) event.preventDefault();
      }, { passive: false });
      document.addEventListener("touchend", (event) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });
    })();
  </script>
  <div class="shell">
    <main class="main">
      <header class="topbar">
        <div class="brand-splash-wrap" aria-hidden="true">
          <img class="brand-splash" src="splash.webp" alt="">
        </div>
        <button class="mobile-menu-button" id="mobileMenuBtn" type="button" aria-expanded="false" aria-controls="mainTabs">菜单</button>
        <nav class="tag-tabs" id="mainTabs" aria-label="参数查询分类">
          <button class="tag-tab active" data-tab="vehicles" type="button">载具查询</button>
          <button class="tag-tab" data-tab="weapons" type="button">枪械查询</button>
          <button class="tag-tab" data-tab="maps" type="button">地图查询</button>
          <button class="tag-tab" data-tab="models" type="button">模型查询</button>
          <button class="tag-tab" data-tab="players" type="button">玩家列表</button>
        </nav>
        <label class="search">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="在载具页中搜索">
        </label>
      </header>

      <section class="content-panel" aria-label="查询结果">
      <section class="compare-bar" aria-label="选择载具比较">
        <button class="primary" id="compareBtn">比较</button>
        <button class="confirm" id="confirmCompareBtn">确认比较</button>
        <div class="compare-hint" id="compareHint">在列表中选两个载具进行对比</div>
        <button class="target-mode-button" id="targetModeBtn">载具索敌优选</button>
        <div class="target-hint" id="targetHint">查看载具索敌的优先级</div>
      </section>

      <section class="table-wrap" aria-label="载具数据表">
        <div class="loading-panel open" id="loadingPanel" role="status" aria-live="polite">
          <div class="loading-card">
            <div class="loading-spinner" aria-hidden="true"></div>
            <div class="loading-title">正在加载数据</div>
            <div class="loading-subtitle">正在请求并解析载具、枪械、地图、模型和玩家数据</div>
          </div>
        </div>
        <table id="vehicleTable">
          <colgroup>
            <col class="faction-col">
            <col class="name-col">
            <col class="icon-col">
            <col class="short-col">
            <col class="medium-col">
            <col class="short-col">
            <col class="medium-col">
            <col class="medium-col">
            <col class="medium-col">
            <col class="short-col">
            <col class="vision-col">
            <col class="blast-col">
          </colgroup>
          <thead>
            <tr>
              <th>阵营</th>
              <th>载具名</th>
              <th>图标</th>
              <th class="sortable" data-sort="hp">生命值<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="speed">最大速度<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="acceleration">加速度<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="turret">炮塔转速<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="threshold">受击门槛<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="reduction">爆炸减伤<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="reload">装填速度<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="vision">玩家视野修正<span class="sort-indicator"></span></th>
              <th class="sortable" data-sort="blast">爆炸伤害<span class="sort-indicator"></span></th>
            </tr>
          </thead>
          <tbody id="vehicleRows"></tbody>
        </table>
        <table id="weaponTable" class="hidden">
          <colgroup>
            <col class="weapon-faction-col">
            <col class="weapon-type-col">
            <col class="weapon-name-col">
            <col class="icon-col">
            <col class="weapon-stat-col">
            <col class="weapon-stat-col">
            <col class="weapon-stat-col">
            <col class="weapon-stat-col">
          </colgroup>
          <thead>
            <tr>
              <th>阵营</th>
              <th>类型</th>
              <th>枪械名称</th>
              <th>图标</th>
              <th class="sortable weapon-sort" data-sort="致死">致死<span class="sort-indicator"></span></th>
              <th class="sortable weapon-sort" data-sort="射速">射速<span class="sort-indicator"></span></th>
              <th class="sortable weapon-sort" data-sort="单发后坐力">单发后坐力<span class="sort-indicator"></span></th>
              <th class="sortable weapon-sort" data-sort="衰减开始距离">衰减开始距离<span class="sort-indicator"></span></th>
            </tr>
          </thead>
          <tbody id="weaponRows"></tbody>
        </table>
        <table id="playerTable" class="hidden">
          <colgroup>
            <col class="player-name-col">
            <col class="player-stat-col">
            <col class="player-stat-col">
            <col class="player-stat-col">
            <col class="player-stat-col">
            <col class="player-stat-col">
          </colgroup>
          <thead>
            <tr>
              <th>ID</th>
              <th class="sortable player-sort" data-sort="xp">XP<span class="sort-indicator"></span></th>
              <th class="sortable player-sort" data-sort="kills">击杀数<span class="sort-indicator"></span></th>
              <th class="sortable player-sort" data-sort="deaths">死亡数<span class="sort-indicator"></span></th>
              <th class="sortable player-sort" data-sort="kd_ratio">K/D<span class="sort-indicator"></span></th>
              <th class="sortable player-sort" data-sort="longest_kill_streak">最长连杀<span class="sort-indicator"></span></th>
            </tr>
          </thead>
          <tbody id="playerRows"></tbody>
        </table>
        <section id="mapTable" class="map-panel hidden" aria-label="地图卡片">
          <div class="map-series-list" id="mapRows"></div>
        </section>
        <section id="modelTable" class="model-panel hidden" aria-label="模型载具卡片">
          <div class="model-card-grid" id="modelRows"></div>
        </section>
      </section>
      <div class="pagination-panel" id="playerPaginationPanel">
        <nav class="pagination" id="playerPagination" aria-label="玩家列表分页"></nav>
      </div>
      </section>
    </main>
  </div>

  <div class="modal" id="compareModal" role="dialog" aria-modal="true" aria-labelledby="compareTitle">
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="compareTitle">载具对比</h2>
        <button class="icon-button" id="closeModal" title="关闭">×</button>
      </div>
      <div class="dialog-body">
        <div class="compare-grid" id="compareCards"></div>
        <div class="metrics" id="compareMetrics"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="dialog detail-dialog">
      <div class="dialog-head">
        <h2 id="detailTitle">载具详细参数</h2>
        <button class="icon-button" id="closeDetailModal" title="关闭">×</button>
      </div>
      <div class="dialog-body">
        <div class="detail-hero" id="detailHero"></div>
        <div class="detail-rows" id="detailRows"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="targetModal" role="dialog" aria-modal="true" aria-labelledby="targetTitle">
    <div class="dialog target-dialog">
      <div class="dialog-head">
        <h2 id="targetTitle">载具索敌优选</h2>
        <button class="icon-button" id="closeTargetModal" title="关闭">×</button>
      </div>
      <div class="dialog-body">
        <div class="target-layout">
          <section class="target-stage" id="targetStage">
            <div class="tank-model" id="targetTank"><div class="tank-label" id="targetTankLabel"></div></div>
          </section>
          <aside class="target-panel">
            <section class="target-section">
              <h3>威胁类型</h3>
              <div class="threat-buttons" id="threatButtons"></div>
            </section>
            <section class="target-section">
              <h3>优先级</h3>
              <div class="priority-list" id="priorityList"></div>
            </section>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="mapModal" role="dialog" aria-modal="true" aria-labelledby="mapTitle">
    <div class="dialog map-dialog">
      <div class="dialog-head">
        <div>
          <h2 id="mapTitle">地图详情</h2>
        </div>
        <button class="icon-button" id="closeMapModal" title="关闭">×</button>
      </div>
      <div class="dialog-body map-body">
        <div class="map-viewer-area">
          <div class="map-stage" id="mapStage">
            <div class="map-loading" id="mapLoading" role="status" aria-live="polite">
              <div class="loading-card">
                <div class="loading-spinner" aria-hidden="true"></div>
                <div class="loading-title">正在加载地图</div>
                <div class="loading-subtitle" id="mapLoadingSubtitle">正在读取地图图片</div>
              </div>
            </div>
            <img id="mapImage" alt="">
          </div>
        </div>
        <aside class="map-perspective-panel" aria-label="阵营视角">
          <div class="map-perspective-title">阵营视角</div>
          <div class="map-perspective-actions" id="mapPerspectiveActions"></div>
        </aside>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="scripts/index.js" defer></script>
</body>
</html>
