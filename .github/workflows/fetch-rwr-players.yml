name: Fetch RWR Pacific players

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fetch-rwr-players.yml"
      - "scripts/fetch-rwr-players.py"
      - "data/rwr-players-pacific.json"
      - "scripts/build-asset-manifest.js"
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Pacific player stats
        run: python scripts/fetch-rwr-players.py

      - name: Update asset manifest
        run: node scripts/build-asset-manifest.js

      - name: Commit updated player data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RWR Pacific player data"
          file_pattern: data/rwr-players-pacific.json data/asset-manifest.json
