<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>模型查看</title>
  <link rel="icon" type="image/webp" href="ico.webp">
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(14, 24, 35, 0.78);
      --panel-strong: rgba(18, 31, 44, 0.92);
      --line: rgba(180, 207, 235, 0.18);
      --text: #edf6ff;
      --muted: #9fb4c8;
      --good: #16a36b;
      --bad: #dc4d4d;
      --accent: #12b7c8;
      --accent-2: #3f7cff;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #111923;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .top-left,
    .light-panel,
    .help-panel,
    .parts-panel,
    .loading-panel {
      position: fixed;
      z-index: 10;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }

    .top-left {
      left: 16px;
      top: 16px;
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 8px;
      display: grid;
      gap: 5px;
    }

    .viewer-control-toggle,
    .viewer-control-backdrop,
    .viewer-control-head {
      display: none;
    }

    .viewer-control-drawer {
      display: contents;
    }

    .help-panel {
      left: 16px;
      top: 100px;
      width: min(260px, calc(100vw - 32px));
      padding: 12px;
      border-radius: 8px;
      display: grid;
      gap: 10px;
    }

    .help-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
      color: var(--text);
    }

    .help-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 34px;
    }

    .help-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(180, 207, 235, 0.24);
      border-radius: 8px;
      color: #dff6ff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 18px;
      font-weight: 900;
    }

    .help-text {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .mobile-help {
      display: none;
    }

    .mobile-help-icon {
      display: none;
    }

    .mobile-help-icon {
      display: none;
    }

    .help-text strong {
      font-size: 12px;
      line-height: 1.25;
      color: var(--text);
    }

    .help-text span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .light-control {
      display: grid;
      grid-template-columns: auto minmax(120px, 1fr) 44px;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .light-panel {
      top: 16px;
      left: 50%;
      width: min(360px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 8px;
      transform: translateX(-50%);
    }

    .light-control input {
      width: 100%;
      accent-color: #20c8d4;
      cursor: pointer;
    }

    .light-value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .parts-panel {
      top: 0;
      right: 0;
      bottom: 0;
      width: max-content;
      min-width: 180px;
      max-width: min(520px, calc(100vw - 24px));
      max-height: none;
      border-width: 0 0 0 1px;
      border-radius: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .parts-head {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-strong);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 850;
      font-size: 13px;
    }

    .parts-close,
    .module-panel-button {
      display: none;
    }

    .part-buttons {
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: max-content;
      justify-content: start;
      align-content: start;
      gap: 8px;
      scrollbar-gutter: stable;
    }

    .part-button {
      border: 0;
      border-radius: 8px;
      min-height: 34px;
      width: auto;
      max-width: min(44ch, calc(100vw - 56px));
      padding: 0 10px;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .part-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .part-button.visible {
      background: linear-gradient(135deg, #22bd7e, var(--good));
    }

    .part-button.hidden-part {
      background: linear-gradient(135deg, #ef6464, var(--bad));
    }

    .loading-panel {
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      border: 0;
      background: rgba(17, 25, 35, 0.52);
      box-shadow: none;
    }

    .loading-card {
      display: grid;
      justify-items: center;
      gap: 14px;
      min-width: min(280px, 82vw);
      padding: 26px 30px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 42px rgba(35, 76, 124, 0.14);
      color: #182838;
    }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid rgba(63, 124, 255, 0.14);
      border-top-color: var(--accent-2);
      border-right-color: var(--accent);
      animation: loadingSpin 0.82s linear infinite;
    }

    .loading-title {
      font-weight: 900;
      color: #182838;
      line-height: 1.3;
    }

    .loading-subtitle {
      color: #66788d;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      max-width: 340px;
      overflow-wrap: anywhere;
    }

    .loading-panel.error .loading-spinner {
      animation: none;
      border-color: rgba(220, 77, 77, 0.18);
      border-top-color: var(--bad);
      border-right-color: var(--bad);
    }

    .loading-panel.error .loading-title {
      color: var(--bad);
    }

    @keyframes loadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 720px) {
      .top-left {
        right: 134px;
        left: 12px;
        top: 12px;
        padding: 10px 12px;
      }

      .viewer-control-toggle {
        position: fixed;
        z-index: 24;
        top: 12px;
        right: 12px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text);
        background: var(--panel-strong);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(14px) saturate(130%);
        -webkit-backdrop-filter: blur(14px) saturate(130%);
        cursor: pointer;
        font-weight: 900;
      }

      .viewer-control-toggle::before {
        content: "☰";
        font-size: 17px;
        line-height: 1;
      }

      .viewer-control-backdrop {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: block;
        background: rgba(0, 0, 0, 0.34);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s ease;
      }

      body.controls-open .viewer-control-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      body.parts-open .viewer-control-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .viewer-control-drawer {
        position: fixed;
        z-index: 23;
        top: 64px;
        right: 12px;
        left: 12px;
        max-height: min(72dvh, calc(100dvh - 82px));
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(14, 24, 35, 0.94);
        box-shadow: 0 24px 54px rgba(0, 0, 0, 0.32);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      body.controls-open .viewer-control-drawer {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .viewer-control-head {
        min-height: 46px;
        padding: 0 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-strong);
        font-weight: 900;
      }

      .viewer-control-close {
        width: 36px;
        height: 36px;
        border: 1px solid rgba(180, 207, 235, 0.2);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }

      .viewer-control-body {
        min-height: 0;
        overflow: auto;
        padding: 12px;
        display: grid;
        gap: 10px;
        -webkit-overflow-scrolling: touch;
      }

      .light-panel {
        position: fixed;
        z-index: 12;
        top: auto;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        left: 12px;
        width: auto;
        padding: 10px 12px;
        transform: none;
        border-radius: 8px;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
      }

      .help-panel {
        position: static;
        width: auto;
        padding: 12px;
        border-radius: 8px;
        display: grid;
        box-shadow: none;
      }

      .desktop-help {
        display: none;
      }

      .mobile-help {
        display: block;
      }

      .desktop-help-icon {
        display: none;
      }

      .mobile-help-icon {
        display: inline;
      }

      .parts-panel {
        position: fixed;
        z-index: 24;
        top: 0;
        right: 0;
        bottom: 0;
        left: auto;
        width: 76px;
        min-width: 0;
        max-width: none;
        max-height: none;
        border-width: 0 0 0 1px;
        border-radius: 0;
        box-shadow: -18px 0 42px rgba(0, 0, 0, 0.28);
        transform: translateX(100%);
        transition: transform 0.18s ease;
      }

      body.parts-open .parts-panel {
        transform: translateX(0);
      }

      .parts-head {
        min-height: 48px;
        padding: 0 6px 0 10px;
        font-size: 12px;
      }

      .parts-close {
        width: 30px;
        height: 30px;
        border: 1px solid rgba(180, 207, 235, 0.2);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      .part-buttons {
        padding: 10px;
        grid-template-columns: 44px;
        justify-content: center;
        max-height: none;
      }

      .part-button {
        width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 0;
      }

      .part-button::before {
        content: attr(data-part-index);
        font-size: 14px;
        line-height: 1;
      }

      .module-panel-button {
        min-height: 44px;
        border: 1px solid rgba(180, 207, 235, 0.2);
        border-radius: 8px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        font-weight: 900;
      }

      .module-panel-button::after {
        content: "›";
        color: var(--muted);
        font-size: 20px;
        line-height: 1;
      }

      .loading-card {
        padding: 22px 24px;
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 16px;
      }

      .meta,
      .light-control {
        font-size: 11px;
      }

      .light-control {
        grid-template-columns: auto minmax(0, 1fr) 38px;
      }

      .part-button {
        max-width: calc(100vw - 32px);
      }

      .top-left {
        right: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="top-left">
    <h1 id="modelTitle">模型查看</h1>
    <div class="meta" id="modelMeta">正在加载模型清单</div>
  </div>

  <button class="viewer-control-toggle" id="viewerControlToggle" type="button" aria-expanded="false" aria-controls="viewerControlDrawer">操作说明</button>
  <div class="viewer-control-backdrop" id="viewerControlBackdrop" aria-hidden="true"></div>

  <div class="light-panel" aria-label="模型光照控制">
    <label class="light-control">
      <span>光照</span>
      <input id="lightSlider" type="range" min="35" max="135" value="82" step="1">
      <span class="light-value" id="lightValue">82%</span>
    </label>
  </div>

  <section class="viewer-control-drawer" id="viewerControlDrawer" aria-label="模型操作说明">
    <div class="viewer-control-head">
      <span>操作说明</span>
      <button class="viewer-control-close" id="viewerControlClose" type="button" aria-label="关闭操作说明">×</button>
    </div>
    <div class="viewer-control-body">
      <aside class="help-panel" aria-label="模型查看操作说明">
        <h2 class="help-title">操作说明</h2>
        <div class="help-row">
          <div class="help-icon"><span class="desktop-help-icon">↻</span><span class="mobile-help-icon">☝</span></div>
          <div class="help-text">
            <strong class="desktop-help">旋转模型</strong>
            <span class="desktop-help">按住鼠标左键拖拽</span>
            <strong class="mobile-help">旋转模型</strong>
            <span class="mobile-help">单指滑动屏幕查看模型</span>
          </div>
        </div>
        <div class="help-row">
          <div class="help-icon"><span class="desktop-help-icon">＋</span><span class="mobile-help-icon">⤢</span></div>
          <div class="help-text">
            <strong class="desktop-help">缩放视图</strong>
            <span class="desktop-help">滚动鼠标滚轮</span>
            <strong class="mobile-help">缩放视图</strong>
            <span class="mobile-help">双指张合放大或缩小</span>
          </div>
        </div>
        <div class="help-row">
          <div class="help-icon"><span class="desktop-help-icon">↔</span><span class="mobile-help-icon">⇄</span></div>
          <div class="help-text">
            <strong class="desktop-help">平移视图</strong>
            <span class="desktop-help">右键或中键拖拽</span>
            <strong class="mobile-help">移动视角</strong>
            <span class="mobile-help">双指同时拖动</span>
          </div>
        </div>
        <div class="help-row">
          <div class="help-icon"><span class="desktop-help-icon">Esc</span><span class="mobile-help-icon">☰</span></div>
          <div class="help-text">
            <strong class="desktop-help">重置视角</strong>
            <span class="desktop-help">按 Esc 回到初始视角</span>
            <strong class="mobile-help">模块显示</strong>
            <span class="mobile-help">点击下方按钮打开右侧模块栏</span>
          </div>
        </div>
      </aside>

      <button class="module-panel-button hidden" id="modulePanelBtn" type="button" aria-expanded="false" aria-controls="partsPanel">模块显示</button>
    </div>
  </section>

  <aside class="parts-panel hidden" id="partsPanel" aria-label="模型模块显示控制">
    <div class="parts-head">
      <span>模块</span>
      <button class="parts-close" id="partsClose" type="button" aria-label="关闭模块显示">×</button>
    </div>
    <div class="part-buttons" id="partButtons"></div>
  </aside>

  <div class="loading-panel" id="loadingPanel" role="status" aria-live="polite">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div class="loading-title" id="loadingTitle">正在加载模型</div>
      <div class="loading-subtitle" id="loadingSubtitle">正在读取模型资源</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const titleEl = document.getElementById("modelTitle");
    const metaEl = document.getElementById("modelMeta");
    const loadingPanel = document.getElementById("loadingPanel");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingSubtitle = document.getElementById("loadingSubtitle");
    const viewerControlToggle = document.getElementById("viewerControlToggle");
    const viewerControlBackdrop = document.getElementById("viewerControlBackdrop");
    const viewerControlClose = document.getElementById("viewerControlClose");
    const modulePanelBtn = document.getElementById("modulePanelBtn");
    const partsClose = document.getElementById("partsClose");
    const partsPanel = document.getElementById("partsPanel");
    const partButtons = document.getElementById("partButtons");
    const lightSlider = document.getElementById("lightSlider");
    const lightValue = document.getElementById("lightValue");

    const params = new URLSearchParams(location.search);
    const requestedId = params.get("id");
    const requestedName = params.get("name");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111923);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });
    const renderPixelRatio = Math.min(Math.max(window.devicePixelRatio || 1, 1.5), 3);
    renderer.setPixelRatio(renderPixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.screenSpacePanning = true;
    controls.mouseButtons = {
      LEFT: THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.PAN,
      RIGHT: THREE.MOUSE.PAN
    };
    controls.touches = {
      ONE: THREE.TOUCH.ROTATE,
      TWO: THREE.TOUCH.DOLLY_PAN
    };

    const lights = {
      hemi: new THREE.HemisphereLight(0xf4fbff, 0x6a7f92, 2.0),
      key: new THREE.DirectionalLight(0xffffff, 2.05),
      fill: new THREE.DirectionalLight(0xd9edff, 1.25),
      front: new THREE.DirectionalLight(0xffffff, 0.7)
    };

    scene.add(lights.hemi);

    lights.key.position.set(4, 7, 5);
    scene.add(lights.key);

    lights.fill.position.set(-5, 3, -4);
    scene.add(lights.fill);

    lights.front.position.set(0, 2, 6);
    scene.add(lights.front);

    const baseLight = {
      exposure: 0.9,
      hemi: lights.hemi.intensity,
      key: lights.key.intensity,
      fill: lights.fill.intensity,
      front: lights.front.intensity
    };
    const maxTextureAnisotropy = renderer.capabilities.getMaxAnisotropy();

    let activeModel = null;
    let animationFrame = null;

    init().catch((error) => {
      console.error(error);
      showError(error.message || "模型加载失败");
    });

    async function init() {
      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && document.body.classList.contains("parts-open")) {
          setPartsPanelOpen(false);
          return;
        }
        if (event.key === "Escape" && document.body.classList.contains("controls-open")) {
          setControlPanelOpen(false);
          return;
        }
        if (event.key === "Escape" && activeModel) resetCamera(activeModel);
      });
      renderer.domElement.addEventListener("contextmenu", (event) => event.preventDefault());
      viewerControlToggle.addEventListener("click", () => {
        setControlPanelOpen(!document.body.classList.contains("controls-open"));
      });
      viewerControlBackdrop.addEventListener("click", () => {
        setControlPanelOpen(false);
        setPartsPanelOpen(false);
      });
      viewerControlClose.addEventListener("click", () => setControlPanelOpen(false));
      modulePanelBtn.addEventListener("click", () => {
        setControlPanelOpen(false);
        setPartsPanelOpen(true);
      });
      partsClose.addEventListener("click", () => setPartsPanelOpen(false));
      lightSlider.addEventListener("input", () => applyLightLevel(Number(lightSlider.value)));
      applyLightLevel(Number(lightSlider.value));

      const response = await fetch("model/models.json", { cache: "no-cache" });
      if (!response.ok) throw new Error(`模型清单加载失败：${response.status}`);
      const models = await response.json();
      if (!Array.isArray(models)) throw new Error("模型清单格式错误");

      const model = models.find((item) => requestedId && item.id === requestedId)
        || models.find((item) => requestedName && item.name === requestedName);
      if (!model) throw new Error("未找到指定模型");
      if (!model.model) throw new Error("该模型没有可加载的 GLB 文件");

      titleEl.textContent = model.name || "模型查看";
      metaEl.textContent = model.model;
      setLoading("正在加载模型", "正在加载 GLB 模型");

      const gltf = await loadGltf(model.model);
      activeModel = gltf.scene;
      activeModel.name = activeModel.name || model.name || "model";
      scene.add(activeModel);
      normalizeMaterials(activeModel);
      resetCamera(activeModel);
      buildPartButtons(activeModel);
      loadingPanel.classList.add("hidden");
      animate();
    }

    function loadGltf(url) {
      const loader = new GLTFLoader();
      return new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, (error) => reject(new Error(error.message || "GLB 模型加载失败")));
      });
    }

    function applyLightLevel(value) {
      const level = Math.max(35, Math.min(135, Number(value) || 82));
      const multiplier = level / 82;
      renderer.toneMappingExposure = baseLight.exposure * Math.pow(multiplier, 0.75);
      lights.hemi.intensity = baseLight.hemi * multiplier;
      lights.key.intensity = baseLight.key * multiplier;
      lights.fill.intensity = baseLight.fill * multiplier;
      lights.front.intensity = baseLight.front * multiplier;
      lightValue.textContent = `${Math.round(level)}%`;
    }

    function setControlPanelOpen(open) {
      document.body.classList.toggle("controls-open", open);
      viewerControlToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function setPartsPanelOpen(open) {
      if (partsPanel.classList.contains("hidden")) open = false;
      document.body.classList.toggle("parts-open", open);
      modulePanelBtn.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function normalizeMaterials(root) {
      root.traverse((node) => {
        if (!node.isMesh) return;
        node.frustumCulled = false;
        if (node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((material) => {
            material.side = THREE.DoubleSide;
            enhanceMaterialTexture(material.map);
            enhanceMaterialTexture(material.normalMap);
            enhanceMaterialTexture(material.roughnessMap);
            enhanceMaterialTexture(material.metalnessMap);
            enhanceMaterialTexture(material.aoMap);
            enhanceMaterialTexture(material.emissiveMap);
            material.needsUpdate = true;
          });
        }
      });
    }

    function enhanceMaterialTexture(texture) {
      if (!texture) return;
      texture.anisotropy = maxTextureAnisotropy;
      texture.needsUpdate = true;
    }

    function resetCamera(root) {
      const box = new THREE.Box3().setFromObject(root);
      if (box.isEmpty()) {
        camera.position.set(4, 3, 5);
        controls.target.set(0, 0, 0);
        controls.update();
        return;
      }

      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z) || 1;
      const fitHeightDistance = maxSize / (2 * Math.atan((Math.PI * camera.fov) / 360));
      const fitWidthDistance = fitHeightDistance / camera.aspect;
      const distance = Math.max(fitHeightDistance, fitWidthDistance) * 1.65;
      const direction = new THREE.Vector3(1, 0.72, 1).normalize();

      camera.near = Math.max(distance / 100, 0.01);
      camera.far = Math.max(distance * 100, 1000);
      camera.updateProjectionMatrix();
      camera.position.copy(center).add(direction.multiplyScalar(distance));
      controls.target.copy(center);
      controls.minDistance = distance / 20;
      controls.maxDistance = distance * 12;
      controls.update();
    }

    function buildPartButtons(root) {
      const parts = collectTopLevelParts(root);
      if (!parts.length) return;
      partsPanel.classList.remove("hidden");
      modulePanelBtn.classList.remove("hidden");
      partButtons.innerHTML = "";
      parts.forEach((node, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "part-button visible";
        button.dataset.partIndex = String(index + 1);
        button.textContent = node.name || `部件 ${index + 1}`;
        button.title = button.textContent;
        button.addEventListener("click", () => {
          node.visible = !node.visible;
          button.classList.toggle("visible", node.visible);
          button.classList.toggle("hidden-part", !node.visible);
        });
        partButtons.appendChild(button);
      });
    }

    function collectTopLevelParts(root) {
      const direct = root.children.filter((node) => hasRenderable(node));
      if (direct.length > 1) return direct;
      if (direct.length === 1 && direct[0].children.some(hasRenderable)) {
        return direct[0].children.filter(hasRenderable);
      }
      return direct;
    }

    function hasRenderable(node) {
      let found = Boolean(node.isMesh);
      if (found) return true;
      node.traverse((child) => {
        if (child !== node && child.isMesh) found = true;
      });
      return found;
    }

    function resize() {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
      if (activeModel) resetCamera(activeModel);
    }

    function animate() {
      animationFrame = requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    function showError(message) {
      loadingPanel.classList.remove("hidden");
      loadingPanel.classList.add("error");
      loadingTitle.textContent = "模型加载失败";
      loadingSubtitle.textContent = message || "请检查模型资源后重试。";
      if (animationFrame) cancelAnimationFrame(animationFrame);
    }

    function setLoading(title, subtitle) {
      loadingPanel.classList.remove("hidden", "error");
      loadingTitle.textContent = title;
      loadingSubtitle.textContent = subtitle;
    }
  </script>
</body>
</html>
